<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Wife Kavita ❤️</title>
    <style>
        /* Prevents scrolling and zooming on mobile */
        body { 
            background-color: #fff0f3; 
            text-align: center; 
            font-family: 'sans-serif'; 
            overflow: hidden; 
            margin: 0; 
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
        }
        .container { 
            padding-top: 20vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { color: #ff4d6d; font-size: 1.2rem; margin-bottom: 10px; }
        h1 { color: #c9184a; font-size: 2rem; padding: 0 15px; line-height: 1.2; }
        .buttons { 
            margin-top: 40px; 
            position: relative; 
            width: 100%; 
            height: 200px; 
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            border-radius: 50px; 
            border: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #yesBtn { background-color: #ff4d6d; color: white; z-index: 10; }
        #noBtn { 
            background-color: #808080; 
            color: white; 
            position: absolute; 
            transition: 0.2s ease;
            left: 50%;
            transform: translateX(20px); /* Starts slightly to the right of Yes */
        }
        .message { 
            display: none; 
            color: #c9184a; 
            font-size: 1.8rem; 
            margin-top: 30vh; 
            padding: 0 20px;
        }
    </style>
</head>
<body>
    <div id="mainContainer" class="container">
        <h2>To the Best Wife in the World...</h2>
        <h1>Will you be my Valentine, Kavita? ❤️</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">YES!</button>
            <button id="noBtn" ontouchstart="moveButton()" onmouseover="moveButton()">NO</button>
        </div>
    </div>
    <div id="celebrationMsg" class="message">
        I LOVE YOU FOREVER, KAVITA! ❤️🌹✨<br>\
