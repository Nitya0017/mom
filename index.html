<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Kavita ❤️</title>
    <style>
        body { 
            background-color: #fff0f3; 
            text-align: center; 
            font-family: sans-serif; 
            overflow: hidden; 
            margin: 0; 
            height: 100vh;
        }
        .container { padding-top: 15vh; }
        h1 { color: #c9184a; font-size: 1.8rem; padding: 0 20px; }
        h2 { color: #ff4d6d; font-size: 1.1rem; }
        .buttons { margin-top: 50px; position: relative; height: 300px; }
        button { 
            padding: 15px 35px; 
            font-size: 20px; 
            border-radius: 50px; 
            border: none; 
            font-weight: bold;
        }
        #yesBtn { background-color: #ff4d6d; color: white; position: relative; z-index: 1; }
        #noBtn { 
            background-color: #808080; 
            color: white; 
            position: absolute; 
            left: 50%; 
            margin-left: 20px; /* Starts next to Yes */
            transition: 0.1s;
            touch-action: none; /* Crucial for mobile */
        }
    </style>
</head>
<body>
    <div id="mainContainer" class="container">
        <h2>To the Best Wife in the World...</h2>
        <h1>Will you be my Valentine, Kavita? ❤️</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">YES!</button>
            <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">NO</button>
        </div>
    </div>

    <script>
        function moveButton() {
            // This math keeps the button inside the phone screen
            const width = window.innerWidth - 100;
            const height = window.innerHeight - 100;
            const newX = Math.random() * width;
            const newY = Math.random() * height;
            
            const noBtn = document.getElementById('noBtn');
            noBtn.style.position = 'fixed';
            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
        }

        function celebrate() {
            document.body.innerHTML = `
                <div style="margin-top: 40vh; color: #c9184a; font-size: 2rem; font-weight: bold;">
                    I LOVE YOU FOREVER, KAVITA! ❤️🌹<br>
                    <span style="font-size: 1.2rem;">Happy Valentine's Day!</span>
                </div>
            `;
            // Add floating hearts
            for(let i=0; i<50; i++) {
                createHeart();
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = '20px';
            heart.style.transition = '3s';
            document.body.appendChild(heart);
            setTimeout(() => {
                heart.style.transform = 'translateY(-110vh)';
                heart.style.opacity = '0';
            }, 100);
        }
    </script>
</body>
</html>
