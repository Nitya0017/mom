<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Kavita ❤️</title>
    <style>
        body { 
            background-color: #fff0f3; 
            text-align: center; 
            font-family: sans-serif; 
            overflow: hidden; 
            margin: 0; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { margin-top: 20vh; width: 100%; }
        h1 { color: #c9184a; font-size: 1.8rem; padding: 0 20px; margin-bottom: 40px; }
        h2 { color: #ff4d6d; font-size: 1.1rem; margin-bottom: 10px; }
        
        /* This keeps the buttons side-by-side */
        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px; /* Space between Yes and No */
            width: 100%;
            position: relative;
        }

        button { 
            padding: 15px 35px; 
            font-size: 20px; 
            border-radius: 50px; 
            border: none; 
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            touch-action: manipulation;
        }

        #yesBtn { background-color: #ff4d6d; color: white; }
        
        #noBtn { 
            background-color: #808080; 
            color: white; 
            transition: 0.1s;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div id="mainContainer" class="container">
        <h2>To the Best Wife in the World...</h2>
        <h1>Will you be my Valentine, Kavita? ❤️</h1>
        <div class="btn-group">
            <button id="yesBtn" onclick="celebrate()">YES!</button>
            <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">NO</button>
        </div>
    </div>

    <script>
        function moveButton() {
            // Screen boundaries
            const padding = 60;
            const newX = Math.random() * (window.innerWidth - padding * 2) + padding;
            const newY = Math.random() * (window.innerHeight - padding * 2) + padding;
            
            const noBtn = document.getElementById('noBtn');
            noBtn.style.position = 'fixed';
            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
            noBtn.style.transform = 'translate(-50%, -50%)';
        }

        function celebrate() {
            document.body.innerHTML = `
                <div style="margin-top: 40vh; color: #c9184a; font-size: 2rem; font-weight: bold; padding: 0 20px;">
                    I LOVE YOU FOREVER, KAVITA! ❤️🌹<br>
                    <span style="font-size: 1.2rem;">Happy Valentine's Day!</span>
                </div>
            `;
            for(let i=0; i<60; i++) { createHeart(); }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = ['❤️', '💖', '🌹', '✨'][Math.floor(Math.random() * 4)];
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = '25px';
            heart.style.transition = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => {
                heart.style.transform = 'translateY(-115vh) rotate(360deg)';
                heart.style.opacity = '0';
            }, 100);
        }
    </script>
</body>
</html>
