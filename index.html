<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Kavita ❤️</title>
    <style>
        body { 
            background-color: #fff0f3; 
            text-align: center; 
            font-family: sans-serif; 
            margin: 0; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h2 { color: #ff4d6d; font-size: 1.2rem; margin: 0; }
        h1 { color: #c9184a; font-size: 2rem; margin: 10px 0 40px 0; padding: 0 20px; }
        
        .btn-container {
            display: flex;
            gap: 20px;
            position: relative;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 60px;
        }

        button { 
            padding: 15px 30px; 
            font-size: 20px; 
            border-radius: 50px; 
            border: none; 
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            touch-action: none; /* Prevents phone from trying to zoom/scroll */
        }

        #yesBtn { background-color: #ff4d6d; color: white; }
        
        #noBtn { 
            background-color: #808080; 
            color: white; 
            position: relative; /* Starts on the right naturally */
        }
    </style>
</head>
<body>
    <div id="main-content">
        <h2>To the Best Wife in the World...</h2>
        <h1>Will you be my Valentine, Kavita? ❤️</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="celebrate()">YES!</button>
            <button id="noBtn" onmouseover="moveBtn()" ontouchstart="moveBtn()">NO</button>
        </div>
    </div>

    <script>
        function moveBtn() {
            const btn = document.getElementById('noBtn');
            // This forces the button to switch to 'fixed' the moment it's touched
            btn.style.position = 'fixed';
            
            // Keeps it 50px away from any edge
            const x = Math.random() * (window.innerWidth - 100) + 50;
            const y = Math.random() * (window.innerHeight - 100) + 50;
            
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.style.transform = 'translate(-50%, -50%)';
        }

        function celebrate() {
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <h1 style="font-size: 2.5rem;">I LOVE YOU FOREVER, KAVITA! ❤️🌹</h1>
                <p style="font-size: 1.3rem; color: #ff4d6d;">Happy Valentine's Day!</p>
            `;
            setInterval(createHeart, 150);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = ['❤️', '💖', '🌹', '✨'][Math.floor(Math.random() * 4)];
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.bottom = '-5vh';
            heart.style.fontSize = '30px';
            heart.style.transition = '4s linear';
            document.body.appendChild(heart);
            setTimeout(() => {
                heart.style.transform = 'translateY(-110vh)';
                heart.style.opacity = '0';
            }, 100);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>
</body>
</html>
